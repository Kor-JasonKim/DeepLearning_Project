<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 방 검사관</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Pretendard', sans-serif; }
        .container { max-width: 500px; padding-top: 40px; }
        
        /* 메인 카드 스타일 */
        .main-card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .title { font-weight: 800; font-size: 1.5rem; text-align: center; margin-bottom: 25px; color: #333; }

        /* 미리보기 영역 (스케치 반영) */
        .preview-box {
            width: 100%;
            aspect-ratio: 1 / 1; /* 정사각형 유지 */
            border: 2px solid #333;
            border-radius: 30px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fff;
            overflow: hidden;
            position: relative;
        }
        .preview-box img, .preview-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .placeholder-text { color: #aaa; font-size: 0.9rem; text-align: center; }

        /* 버튼 레이아웃 */
        .button-row { display: flex; gap: 12px; margin-bottom: 15px; }
        .btn-custom { 
            flex: 1; 
            padding: 15px; 
            border-radius: 15px; 
            font-weight: 600; 
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        /* 카메라 버튼 (파란색 테두리) */
        .btn-cam { border: 2px solid #4A6CF7; color: #4A6CF7; background: white; }
        /* 갤러리 버튼 (검정색 테두리) */
        .btn-gal { border: 2px solid #333; color: #333; background: white; }
        /* 판독 버튼 (초록색) */
        .btn-submit { 
            background-color: #488b62; 
            color: white; 
            border: none; 
            width: 100%; 
            padding: 18px; 
            border-radius: 20px; 
            font-size: 1.1rem; 
            font-weight: 700;
        }
        
        #btn-snap { background-color: #ff4757; color: white; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-card">
        <div class="title">✨ AI 방 검사관</div>

        <div class="preview-box" id="display-area">
            <div class="placeholder-text" id="placeholder">📷 사진을 찍거나<br>갤러리에서 선택하세요</div>
            <video id="camera-stream" autoplay playsinline style="display:none;"></video>
            <img id="captured-image" style="display:none;">
        </div>

        <form action="/" method="post" enctype="multipart/form-data">
            <input type="file" id="image-input" name="image" accept="image/*" style="display:none;">
            
            <div class="button-row">
                <button type="button" id="btn-camera" class="btn-custom btn-cam">
                    <span>📷</span> 카메라 켜기
                </button>
                <button type="button" id="btn-gallery" class="btn-custom btn-gal">
                    <span>🖼️</span> 갤러리 선택
                </button>
            </div>

            <button type="button" id="btn-snap" class="btn btn-custom w-100 mb-3" style="display:none;">
                ⚪ 지금 촬영하기
            </button>

            <button type="submit" class="btn-submit">AI 판독 시작</button>
        </form>
    </div>
</div>

<script>
    const video = document.getElementById('camera-stream');
    const imageInput = document.getElementById('image-input');
    const capturedImage = document.getElementById('captured-image');
    const placeholder = document.getElementById('placeholder');
    
    const btnCamera = document.getElementById('btn-camera');
    const btnSnap = document.getElementById('btn-snap');
    const btnGallery = document.getElementById('btn-gallery');

    // 카메라 켜기
    btnCamera.onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            video.style.display = 'block';
            capturedImage.style.display = 'none';
            placeholder.style.display = 'none';
            btnSnap.style.display = 'block';
        } catch (err) {
            alert("카메라 권한이 필요합니다!");
        }
    };

    // 사진 촬영
    btnSnap.onclick = () => {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        const dataUrl = canvas.toDataURL('image/jpeg');
        capturedImage.src = dataUrl;
        capturedImage.style.display = 'block';
        video.style.display = 'none';
        btnSnap.style.display = 'none';

        // 이미지 파일화
        fetch(dataUrl).then(res => res.blob()).then(blob => {
            const file = new File([blob], "capture.jpg", { type: "image/jpeg" });
            const dataTransfer = new DataTransfer();
            dataTransfer.items.add(file);
            imageInput.files = dataTransfer.files;
        });
    };

    // 갤러리 선택 버튼 클릭 시 숨겨진 input 호출
    btnGallery.onclick = () => imageInput.click();

    // 갤러리에서 파일 선택 시 미리보기
    imageInput.onchange = (e) => {
        if (e.target.files && e.target.files[0]) {
            const reader = new FileReader();
            reader.onload = (event) => {
                capturedImage.src = event.target.result;
                capturedImage.style.display = 'block';
                video.style.display = 'none';
                placeholder.style.display = 'none';
                btnSnap.style.display = 'none';
            };
            reader.readAsDataURL(e.target.files[0]);
        }
    };
</script>

</body>
</html>
